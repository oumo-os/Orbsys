version: "3.9"

# Orb Sys — full stack
# Usage:
#   docker compose up -d
#   docker compose exec api alembic upgrade head
#   docker compose exec api python -m src.scripts.seed
#
# Frontend: http://localhost:3000
# API docs: http://localhost:8000/docs
# NATS mon: http://localhost:8222

x-common-env: &common-env
  DATABASE_URL_SYNC: "postgresql://orbsys_app:change_me@postgres:5432/orbsys"
  JWT_SECRET_KEY: "dev-secret-change-in-production"
  JWT_ALGORITHM: "HS256"
  NATS_URL: "nats://nats:4222"
  APP_ENV: "development"

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orbsys_migrations
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: orbsys
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbsys_migrations -d orbsys"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports: ["4222:4222", "8222:8222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes: [minio_data:/data]
    ports: ["9000:9000", "9001:9001"]

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql+asyncpg://orbsys_app:change_me@postgres:5432/orbsys"
      CORS_ORIGINS: "http://localhost:3000"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "orbsys"
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      nats:     {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  blind:
    build:
      context: ../apps/blind
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://orbsys_blind:change_me@postgres:5432/orbsys"
      JWT_SECRET_KEY: "dev-secret-change-in-production"
    ports: ["8001:8001"]
    depends_on:
      postgres: {condition: service_healthy}

  # ── Engine services ─────────────────────────────────────────────────────────

  integrity:
    build:
      context: ../services/integrity
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql+asyncpg://orbsys_integrity:change_me@postgres:5432/orbsys"
    depends_on:
      postgres: {condition: service_healthy}
      nats:     {condition: service_healthy}
    restart: unless-stopped

  inferential:
    build:
      context: ../services/inferential
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql+asyncpg://orbsys_inferential:change_me@postgres:5432/orbsys"
    depends_on:
      postgres: {condition: service_healthy}
      nats:     {condition: service_healthy}
    restart: unless-stopped

  insight:
    build:
      context: ../services/insight
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql+asyncpg://orbsys_insight:change_me@postgres:5432/orbsys"
      LLM_BACKEND: "openai"
      LLM_API_KEY: ""
      LLM_MODEL: "gpt-4o"
    depends_on:
      postgres: {condition: service_healthy}
      nats:     {condition: service_healthy}
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports: ["3000:3000"]
    depends_on:
      api: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
